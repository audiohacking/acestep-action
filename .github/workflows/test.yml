name: Test Ace-Step Action

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test Audio Generation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate audio with Ace-Step
        id: generate
        uses: ./
        with:
          caption: 'upbeat electronic chiptune music'
          lyrics: ''
          duration: '5'
          inference_steps: '4'
          output_path: 'output.wav'

      - name: Check output
        run: |
          echo "Generated audio file: ${{ steps.generate.outputs.audio_file }}"
          echo "Generation time: ${{ steps.generate.outputs.generation_time }} seconds"
          ls -lh "${{ steps.generate.outputs.audio_file }}"

      - name: Upload audio artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-audio
          path: ${{ steps.generate.outputs.audio_file }}
          retention-days: 5

