name: 'Ace-Step Audio Generation'
description: 'Generate audio files using Ace-Step model with automatic model caching'
author: 'audiohacking'

branding:
  icon: 'music'
  color: 'purple'

inputs:
  prompt:
    description: 'Text prompt for music generation'
    required: false
    default: 'chiptune'
  lyrics:
    description: 'Lyrics for the generation (use [inst] for instrumental)'
    required: false
    default: '[inst]'
  duration:
    description: 'Duration of the generated audio in seconds'
    required: false
    default: '20.0'
  seed:
    description: 'Random seed for reproducible generation (optional)'
    required: false
  model_cache_path:
    description: 'Path to cache the model files'
    required: false
    default: '~/.cache/acestep'
  output_path:
    description: 'Output path for the generated MP3 file'
    required: false
    default: 'output.mp3'

outputs:
  audio_file:
    description: 'Path to the generated MP3 audio file'
  generation_time:
    description: 'Time taken to generate the audio in seconds'

runs:
  using: 'docker'
  # Use pre-built image from GitHub Container Registry for faster execution
  # To use local Dockerfile instead, change 'image:' to 'image: Dockerfile'
  image: 'docker://ghcr.io/audiohacking/acestep-action:latest'
