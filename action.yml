name: 'Ace-Step Audio Generation'
description: 'Generate audio using Ace-Step 1.5 via acestep.cpp — pre-bundled models, no wait'
author: 'audiohacking'

branding:
  icon: 'music'
  color: 'purple'

inputs:
  caption:
    description: 'Text description for music generation'
    required: false
    default: 'chiptune'
  lyrics:
    description: 'Lyrics (leave empty for LLM auto-generation)'
    required: false
    default: ''
  duration:
    description: 'Duration of the generated audio in seconds'
    required: false
    default: '20'
  seed:
    description: 'Random seed for reproducible generation (optional)'
    required: false
    default: ''
  inference_steps:
    description: 'Number of DiT inference steps'
    required: false
    default: '8'
  shift:
    description: 'Flow matching shift parameter'
    required: false
    default: '3'
  vocal_language:
    description: 'Vocal language code (en, fr, es, …)'
    required: false
    default: 'en'
  output_path:
    description: 'Output path for the generated WAV file (relative to workspace or absolute)'
    required: false
    default: 'output.wav'

outputs:
  audio_file:
    description: 'Path to the generated WAV audio file'
  generation_time:
    description: 'Time taken to generate the audio in seconds'

runs:
  using: 'docker'
  # Pre-built image from GitHub Container Registry — binaries and models are
  # already included, so action execution starts immediately.
  # To develop locally, change to: image: 'Dockerfile'
  image: 'docker://ghcr.io/audiohacking/acestep-action:latest'

